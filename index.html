<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup-Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-layer"> </div>

    <div class="container">
        <div class="left"></div>
        <div class="right">
            <h1>Wanna be my friend?</h1>
                 <h2>Sign-up for the waitlist to join the club!</h2>
                <form>
                        <div>
                            <label for="first_name">First Name:<span>*</span></label>
                            <input type="text" id="first_name" name="name" required>
                        </div>
                    
                        <div>
                            <label for="last_name">Last Name:<span>*</span></label>
                            <input type="text" id="last_name" name="last_name" required>
                        </div>

                        <div>
                            <label for="phone_number">Phone Number:<span>*</span></label>
                            <input type="tel" id="phone_number" name="number"
                             pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" title="Please use 123-456-7890 format" required>
                        </div>
                    
                        <div>
                            <label for="email">Email:<span>*</span></label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div>
                            <label for="password">Password:<span>*</span></label>
                            <input type="password" id="password" name="password" required>
                        </div>

                        <div>
                            <label for="confirm_password">Confirm Password:<span>*</span></label>
                            <input type="password" id="confirm_password" required>
                        </div>

                        <div class="footer"> 
                            <button type="submit">Create Account</button>

                            <div class="login">Already friends? <a>  Log in</a></div>
                        </div>
                </form>
        </div>
    </div>
</body>
</html>
